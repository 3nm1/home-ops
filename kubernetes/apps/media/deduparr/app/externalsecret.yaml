---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: deduparr
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: deduparr-secret
    creationPolicy: Owner
    template:
      data:
        DEDUPARR_RADARR_MOVIES_API_KEY: "{{ .RADARR_API_KEY }}"
        DEDUPARR_SONARR_SERIES_API_KEY: "{{ .SONARR_API_KEY }}"
  dataFrom:
    - extract:
        key: radarr
    - extract:
        key: sonarr
