---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: deduparr
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: deduparr-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        DEDUPARR_RADARR_MOVIES_API_KEY: "{{ .RADARR_API_KEY }}"
        DEDUPARR_SONARR_SERIES_API_KEY: "{{ .SONARR_API_KEY }}"
        DEDUPARR_RADARR_4K_API_KEY: "{{ .RADARR4K_API_KEY }}"
        DEDUPARR_SONARR_4K_API_KEY: "{{ .SONARR4K_API_KEY }}"
  dataFrom:
    - extract:
        key: radarr
    - extract:
        key: sonarr
    - extract:
        key: radarr4k
      rewrite:
        - regexp:
            source: "^RADARR_API_KEY$"
            target: "RADARR4K_API_KEY"
    - extract:
        key: sonarr4k
      rewrite:
        - regexp:
            source: "^SONARR_API_KEY$"
            target: "SONARR4K_API_KEY"
