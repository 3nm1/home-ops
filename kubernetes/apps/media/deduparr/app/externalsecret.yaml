---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: deduparr
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: deduparr-secret
    creationPolicy: Owner
  data:
    - secretKey: DEDUPARR_RADARR_MOVIES_API_KEY
      remoteRef:
        key: radarr
        property: RADARR_API_KEY
    - secretKey: DEDUPARR_SONARR_SERIES_API_KEY
      remoteRef:
        key: sonarr
        property: SONARR_API_KEY
    - secretKey: DEDUPARR_RADARR_4K_API_KEY
      remoteRef:
        key: radarr4k
        property: RADARR_API_KEY
    - secretKey: DEDUPARR_SONARR_4K_API_KEY
      remoteRef:
        key: sonarr4k
        property: SONARR_API_KEY
