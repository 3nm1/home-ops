---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: theme-park
spec:
  chartRef:
    kind: OCIRepository
    name: theme-park
  interval: 1h
  values:
    controllers:
      theme-park:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/themepark-dev/theme.park
              tag: 1.22.1
            env:
              PGID: "1000"
              PUID: "1000"
              TZ: Europe/Stockholm
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /css/base/radarr/radarr-base.css
                    port: &port 80
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probe
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 128Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames: ["theme-park.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
      css:
        hostnames:
          - "radarr.${SECRET_DOMAIN}"
          - "radarr4k.${SECRET_DOMAIN}"
          - "sonarr.${SECRET_DOMAIN}"
          - "prowlarr.${SECRET_DOMAIN}"
          - "lidarr.${SECRET_DOMAIN}"
          - "bazarr.${SECRET_DOMAIN}"
          - "sabnzbd.${SECRET_DOMAIN}"
          - "seerr.${SECRET_DOMAIN}"
          - "jellyfin.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /css
            backendRefs:
              - identifier: app
                port: *port
