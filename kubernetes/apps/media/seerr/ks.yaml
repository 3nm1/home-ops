---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: seerr
spec:
  dependsOn:
    - name: external-secrets-stores
      namespace: external-secrets
    - name: longhorn
      namespace: flux-system
    - name: jellyfin
    - name: radarr
    - name: sonarr
  interval: 1h
  path: ./kubernetes/apps/media/seerr/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: media
  wait: false
