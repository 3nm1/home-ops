---
apiVersion: v1
kind: ConfigMap
metadata:
  name: seerr-oidc-merge
data:
  merge-oidc.js: |
    const fs = require("node:fs");

    const settingsPath = "/app/config/settings.json";

    if (!fs.existsSync(settingsPath)) {
      console.log("oidc-merge: settings.json missing, skipping");
      process.exit(0);
    }

    const clientId = process.env.OIDC_CLIENT_ID;
    const clientSecret = process.env.OIDC_CLIENT_SECRET;
    const issuer = process.env.OIDC_ISSUER_URL;

    if (!clientId || !clientSecret || !issuer) {
      console.error("oidc-merge: OIDC credentials missing");
      process.exit(1);
    }

    const data = JSON.parse(fs.readFileSync(settingsPath, "utf8"));
    if (!data.main) data.main = {};
    data.main.oidcLogin = true;
    if (!data.oidc) data.oidc = {};
    const providers = (data.oidc.providers || []).filter(
      (provider) => provider.slug !== "authentik",
    );
    providers.push({
      slug: "authentik",
      name: "authentik",
      issuerUrl: issuer,
      clientId,
      clientSecret,
      newUserLogin: true,
    });
    data.oidc.providers = providers;
    fs.writeFileSync(settingsPath, `${JSON.stringify(data, null, 2)}\n`);
    console.log("oidc-merge: Authentik OIDC configured in settings.json");
