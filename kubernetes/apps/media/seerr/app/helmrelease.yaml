---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seerr
spec:
  chartRef:
    kind: OCIRepository
    name: seerr
  interval: 1h
  timeout: 10m
  upgrade:
    remediation:
      retries: 3
  values:
    controllers:
      seerr:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          oidc-config:
            image:
              repository: ghcr.io/seerr-team/seerr
              tag: preview-new-oidc
            command:
              - node
              - /scripts/merge-oidc.js
            env:
              OIDC_ISSUER_URL: https://auth.${SECRET_DOMAIN}/application/o/seerr/
            envFrom:
              - secretRef:
                  name: seerr-oidc-secret
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 64Mi
        containers:
          app:
            image:
              repository: ghcr.io/seerr-team/seerr
              tag: preview-new-oidc
            env:
              LOG_LEVEL: info
              PORT: &port 80
              TZ: Europe/Stockholm
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/status
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/status
                    port: *port
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probe
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 2Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames: ["seerr.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
          - name: envoy-external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      config:
        existingClaim: seerr
        globalMounts:
          - path: /app/config
      oidc-merge:
        type: configMap
        name: seerr-oidc-merge
        defaultMode: 493
        globalMounts:
          - path: /scripts
            readOnly: true
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
