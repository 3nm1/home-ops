---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: seerr-oidc
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: seerr-oidc-secret
    creationPolicy: Owner
    template:
      data:
        OIDC_CLIENT_ID: "{{ .OIDC_CLIENT_ID }}"
        OIDC_CLIENT_SECRET: "{{ .OIDC_CLIENT_SECRET }}"
  dataFrom:
    - extract:
        key: seerr
