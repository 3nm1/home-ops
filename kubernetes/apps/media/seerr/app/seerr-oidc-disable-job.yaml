# Emergency recovery when OIDC locks you out of Seerr.
# kubectl scale deployment seerr -n media --replicas=0
# kubectl wait --for=delete pod -l app.kubernetes.io/name=seerr -n media --timeout=120s
# kubectl apply -f seerr-oidc-disable-job.yaml
# kubectl wait job/seerr-oidc-disable -n media --for=condition=complete --timeout=180s
# kubectl logs -n media job/seerr-oidc-disable
# kubectl delete job seerr-oidc-disable -n media
# flux reconcile helmrelease seerr -n media --force
---
apiVersion: batch/v1
kind: Job
metadata:
  name: seerr-oidc-disable
  namespace: media
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: disable
          image: ghcr.io/seerr-team/seerr@sha256:c92d2dc117f62185e7bcb88cd56efd374ea79210eaf433275449e8d5988eb5a8
          imagePullPolicy: IfNotPresent
          command:
            - node
            - -e
            - |
              const fs = require("node:fs");
              const settingsPath = "/app/config/settings.json";
              const data = JSON.parse(fs.readFileSync(settingsPath, "utf8"));
              data.main = data.main || {};
              data.main.oidcLogin = false;
              data.main.localLogin = true;
              data.main.mediaServerLogin = true;
              fs.writeFileSync(settingsPath, JSON.stringify(data, null, 2) + "\n");
              console.log("oidc-disable: OIDC disabled, local and media server login restored");
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: config
              mountPath: /app/config
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: seerr
