# One-shot: scale Seerr to 0, apply this Job, wait for completion, then reconcile HelmRelease.
# kubectl scale deployment seerr -n media --replicas=0
# kubectl wait --for=delete pod -l app.kubernetes.io/name=seerr -n media --timeout=120s
# kubectl apply -f seerr-oidc-merge-job.yaml
# kubectl wait job/seerr-oidc-merge -n media --for=condition=complete --timeout=180s
# kubectl delete job seerr-oidc-merge -n media
---
apiVersion: batch/v1
kind: Job
metadata:
  name: seerr-oidc-merge
  namespace: media
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: merge
          image: ghcr.io/seerr-team/seerr@sha256:a14a9c326881fdce70b00df3fc095f5b5b128f5552677f677cd3788e757fb4e6
          imagePullPolicy: IfNotPresent
          command:
            - node
            - /scripts/merge-oidc.js
          env:
            - name: OIDC_ISSUER_URL
              value: https://auth.engstrom.live/application/o/seerr/
          envFrom:
            - secretRef:
                name: seerr-oidc-secret
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: config
              mountPath: /app/config
            - name: scripts
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: seerr
        - name: scripts
          configMap:
            name: seerr-oidc-merge
            defaultMode: 493
