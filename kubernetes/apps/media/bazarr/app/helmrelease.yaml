---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bazarr
spec:
  chartRef:
    kind: OCIRepository
    name: bazarr
  interval: 1h
  values:
    controllers:
      bazarr:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          theme:
            image:
              repository: ghcr.io/home-operations/bazarr
              tag: 1.6.0
            command: ["/bin/sh", "/scripts/inject-bazarr.sh"]
            env:
              TP_HOSTNAME: bazarr.${SECRET_DOMAIN}
              TP_THEME: hotpink
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 64Mi
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/bazarr
              tag: 1.6.0
            env:
              BAZARR__PORT: &port 80
              TZ: Europe/Stockholm
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/system/ping
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probe
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames: ["bazarr.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      config:
        existingClaim: bazarr
      scripts:
        type: configMap
        name: theme-park-inject
        defaultMode: 493
        advancedMounts:
          bazarr:
            theme:
              - path: /scripts
      ui:
        type: emptyDir
        advancedMounts:
          bazarr:
            theme:
              - path: /ui
            app:
              - path: /app/bin/frontend/build
      data:
        type: nfs
        server: 192.168.20.20
        path: /mnt/Backup/data
        globalMounts:
          - path: /data
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
