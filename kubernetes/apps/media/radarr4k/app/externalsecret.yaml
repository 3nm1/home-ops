---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: radarr4k
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: radarr4k-secret
    creationPolicy: Owner
    template:
      data:
        RADARR__AUTH__APIKEY: "{{ .RADARR_API_KEY }}"
  dataFrom:
    - extract:
        key: radarr4k
