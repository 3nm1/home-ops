---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sonarr4k
spec:
  dependsOn:
    - name: external-secrets-stores
      namespace: external-secrets
    - name: longhorn
      namespace: flux-system
  interval: 1h
  path: ./kubernetes/apps/media/sonarr4k/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: media
  wait: false
