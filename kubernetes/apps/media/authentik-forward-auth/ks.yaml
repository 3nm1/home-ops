---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: authentik-forward-auth
spec:
  dependsOn:
    - name: authentik
      namespace: authentik
    - name: sonarr
    - name: sonarr4k
    - name: radarr
    - name: radarr4k
    - name: prowlarr
    - name: lidarr
    - name: bazarr
    - name: sabnzbd
  interval: 1h
  path: ./kubernetes/apps/media/authentik-forward-auth/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: media
  wait: false
