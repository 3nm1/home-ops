---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: envoy-proxy
spec:
  jobLabel: proxy-stats
  namespaceSelector:
    any: true
  selector:
    matchLabels:
      app.kubernetes.io/component: proxy
      app.kubernetes.io/name: envoy
  podMetricsEndpoints:
    - path: /stats/prometheus
      port: metrics
      interval: 15s
      honorLabels: true
