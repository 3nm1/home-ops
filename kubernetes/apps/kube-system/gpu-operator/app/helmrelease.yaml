---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gpu-operator
spec:
  interval: 30m
  chart:
    spec:
      chart: gpu-operator
      version: v25.3.2
      sourceRef:
        kind: HelmRepository
        name: nvidia
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    driver:
      enabled: false
    toolkit:
      enabled: false
    operator:
      nodeSelector:
        nvidia.com/gpu.present: "true"
    hostPaths:
      driverInstallDir: /usr/local
    daemonsets:
      labels:
        app.kubernetes.io/part-of: gpu-operator
