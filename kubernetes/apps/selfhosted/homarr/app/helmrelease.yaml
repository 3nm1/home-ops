---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homarr
spec:
  chartRef:
    kind: OCIRepository
    name: homarr
  interval: 1h
  values:
    strategyType: Recreate
    image:
      repository: ghcr.io/homarr-labs/homarr
      tag: v1.70.0
    env:
      TZ: Europe/Stockholm
      LOG_LEVEL: info
      BASE_URL: https://homarr.${SECRET_DOMAIN}
      NEXTAUTH_URL: https://homarr.${SECRET_DOMAIN}
      AUTH_TRUST_HOST: "true"
      AUTH_PROVIDERS: credentials,oidc
      AUTH_OIDC_ISSUER: https://auth.${SECRET_DOMAIN}/application/o/homarr
      AUTH_OIDC_CLIENT_NAME: Authentik
      AUTH_OIDC_SCOPE_OVERWRITE: openid email profile groups
      AUTH_OIDC_GROUPS_ATTRIBUTE: groups
      AUTH_LOGOUT_REDIRECT_URL: https://auth.${SECRET_DOMAIN}/application/o/homarr/end-session/
    envSecrets:
      authOidcCredentials:
        existingSecret: homarr-secret
        oidcClientId: oidc-client-id
        oidcClientSecret: oidc-client-secret
      dbEncryption:
        existingSecret: homarr-secret
        key: db-encryption-key
    database:
      type: sqlite
    persistence:
      homarrDatabase:
        enabled: true
        storageClassName: longhorn
        size: 1Gi
        accessMode: ReadWriteOnce
    resources:
      requests:
        cpu: 50m
        memory: 512Mi
      limits:
        memory: 1Gi
    readinessProbe:
      initialDelaySeconds: 60
      failureThreshold: 10
    livenessProbe:
      initialDelaySeconds: 90
      failureThreshold: 10
    httproute:
      enabled: true
      hostnames:
        - homarr.${SECRET_DOMAIN}
      parentRefs:
        - name: envoy-internal
          namespace: network
          sectionName: https
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - port: 7575
