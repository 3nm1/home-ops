---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: authentik-secret
    creationPolicy: Owner
    template:
      data:
        SECRET_KEY: "{{ .SECRET_KEY }}"
        POSTGRESQL_PASSWORD: "{{ .POSTGRESQL_PASSWORD }}"
  dataFrom:
    - extract:
        key: authentik
