---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
spec:
  interval: 1h
  timeout: 15m
  chart:
    spec:
      chart: authentik
      version: 2026.5.4
      sourceRef:
        kind: HelmRepository
        name: authentik
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  valuesFrom:
    - kind: Secret
      name: authentik-secret
      valuesKey: SECRET_KEY
      targetPath: authentik.secret_key
    - kind: Secret
      name: authentik-secret
      valuesKey: POSTGRESQL_PASSWORD
      targetPath: authentik.postgresql.password
    - kind: Secret
      name: authentik-secret
      valuesKey: POSTGRESQL_PASSWORD
      targetPath: postgresql.auth.password
  values:
    global:
      security:
        allowInsecureImages: true
      env:
        - name: AUTHENTIK_HOST
          value: https://auth.${SECRET_DOMAIN}
        - name: TZ
          value: Europe/Stockholm
    authentik:
      error_reporting:
        enabled: false
    postgresql:
      enabled: true
      auth:
        username: authentik
        database: authentik
      primary:
        persistence:
          enabled: true
          storageClass: longhorn
          size: 10Gi
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 512Mi
    server:
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 2Gi
      startupProbe:
        timeoutSeconds: 10
        failureThreshold: 60
      route:
        main:
          enabled: true
          hostnames:
            - auth.${SECRET_DOMAIN}
          parentRefs:
            - name: envoy-internal
              namespace: network
              sectionName: https
            - name: envoy-external
              namespace: network
              sectionName: https
          additionalRules:
            - backendRefs:
                - name: ak-outpost-authentik-embedded-outpost
                  port: 9000
              matches:
                - path:
                    type: PathPrefix
                    value: /outpost.goauthentik.io
    worker:
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 2Gi
      startupProbe:
        timeoutSeconds: 10
        failureThreshold: 60
