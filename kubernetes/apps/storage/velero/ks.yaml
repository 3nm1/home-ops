---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: velero
spec:
  dependsOn:
    - name: external-secrets-stores
      namespace: external-secrets
    - name: minio-backup
  interval: 1h
  path: ./kubernetes/apps/storage/velero/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: velero
  wait: false
