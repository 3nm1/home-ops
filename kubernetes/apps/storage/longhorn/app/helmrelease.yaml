---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
spec:
  interval: 30m
  chart:
    spec:
      chart: longhorn
      version: 1.6.x
      sourceRef:
        kind: HelmRepository
        name: longhorn

  values:
    defaultSettings:
      defaultReplicaCount: 3
      defaultDataPath: /var/mnt/longhorn
      replicaNodeLevelSoftAntiAffinity: false
      backupTarget: nfs://192.168.20.20:/mnt/NFS/longhorn

    persistence:
      defaultClass: true

    metrics:
      serviceMonitor:
        enabled: true
