---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
spec:
  interval: 30m
  chart:
    spec:
      chart: longhorn
      # Stay on 1.6.x until the cluster is stable; upgrade one minor at a time via PR.
      version: 1.6.4
      sourceRef:
        kind: HelmRepository
        name: longhorn

  values:
    defaultSettings:
      defaultReplicaCount: 2
      defaultDataPath: /var/mnt/longhorn
      replicaNodeLevelSoftAntiAffinity: true
      backupTarget: nfs://192.168.20.20:/mnt/NFS/longhorn

    persistence:
      defaultClass: true
      defaultClassReplicaCount: 2

    metrics:
      serviceMonitor:
        enabled: true
